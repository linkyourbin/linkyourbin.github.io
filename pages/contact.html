<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>联系 - LinkYourBin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="logo">
                    <i class="fas fa-microchip"></i>
                    LinkYourBin
                </a>
                <div class="nav-links">
                    <a href="../index.html#home">首页</a>
                    <a href="../pages/chips.html">芯片</a>
                    <a href="../pages/projects.html">项目</a>
                    <a href="../pages/about.html">关于</a>
                    <a href="../pages/contact.html">联系</a>
                </div>
                <div class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
            </nav>
        </div>
    </header>

    <!-- Contact Section -->
    <section class="contact">
        <div class="container">
            <div class="section-title">
                <h2>联系我</h2>
                <p>如果您有任何问题或合作意向，欢迎随时联系</p>
            </div>
            <div class="contact-container">
                <div class="contact-info">
                    <h3>让我们建立联系</h3>
                    <p>如果您对嵌入式开发、AI应用或技术合作感兴趣，欢迎通过以下方式与我联系。</p>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-github"></i></a>
                        <a href="#"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>
                <div class="contact-form">
                    <form>
                        <div class="form-group">
                            <input type="text" placeholder="您的姓名" required>
                        </div>
                        <div class="form-group">
                            <input type="email" placeholder="您的邮箱" required>
                        </div>
                        <div class="form-group">
                            <textarea placeholder="您的消息" required></textarea>
                        </div>
                        <button type="submit" class="btn">发送消息</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">

                </div>
                <div class="copyright">
                    &copy; 2023 LinkYourBin. 保留所有权利。
                </div>
            </div>
        </div>
    </footer>

    <script src="../assets/js/script.js"></script>
